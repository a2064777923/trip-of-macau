version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: trip-of-macau-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Abc123456
      MYSQL_DATABASE: aoxiaoyou
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --explicit_defaults_for_timestamp=ON
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/local/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pAbc123456"]
      interval: 10s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:7.0
    container_name: trip-of-macau-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: aoxiaoyou_doc
      TZ: Asia/Shanghai
    volumes:
      - mongo_data:/data/db
      - ./scripts/local/mongo/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://root:root@127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
  mongo_data:
