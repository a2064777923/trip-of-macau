spring:
  application:
    name: trip-of-macau-server
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aoxiaoyou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: password
  data:
    redis:
      host: localhost
      port: 6379
      password: ''
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: your-256-bit-secret-key-here-change-in-production
  access-token-validity: 7200
  refresh-token-validity: 604800

logging:
  level:
    com.aoxiaoyou: DEBUG
