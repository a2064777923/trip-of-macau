spring:
  application:
    name: trip-of-macau-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/aoxiaoyou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aoxiaoyou.tripofmacau.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  map:
    default-style: cartoon
    cdn-base-url: ${MAP_CDN_BASE_URL:https://cdn.tripofmacau.com/maps/macau}
  trigger:
    cooldown-seconds: ${TRIGGER_COOLDOWN_SECONDS:1800}
    debounce-millis: ${TRIGGER_DEBOUNCE_MILLIS:2000}
    manual-checkin-radius: ${MANUAL_CHECKIN_RADIUS:200}

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-in-production}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:7200}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800}

logging:
  level:
    com.aoxiaoyou.tripofmacau: ${APP_LOG_LEVEL:INFO}
    org.springframework.jdbc: WARN
