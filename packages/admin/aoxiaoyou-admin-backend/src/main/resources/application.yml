spring:
  application:
    name: aoxiaoyou-admin-backend
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aoxiaoyou_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: password
  data:
    redis:
      host: localhost
      port: 6379
      password: ''
      database: 1

server:
  port: 8081

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: admin-secret-key-change-in-production
  access-token-validity: 7200
  refresh-token-validity: 604800

xxl:
  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: aoxiaoyou-admin-executor
      port: 9999
      logpath: /tmp/xxl-job/jobhandler

logging:
  level:
    com.aoxiaoyou.admin: DEBUG
