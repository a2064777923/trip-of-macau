spring:
  application:
    name: aoxiaoyou-admin-backend
  profiles:
    group:
      prod: cloudbase
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 10000
      validation-timeout: 5000
      maximum-pool-size: 5
      minimum-idle: 1
      keepalive-time: 30000
      max-lifetime: 600000
      idle-timeout: 120000
  data:
    mongodb:
      auto-index-creation: true
  servlet:
    multipart:
      max-file-size: ${APP_MEDIA_MAX_FILE_SIZE:128MB}
      max-request-size: ${APP_MEDIA_MAX_REQUEST_SIZE:256MB}

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aoxiaoyou.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-in-production}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:7200}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800}

logging:
  level:
    com.aoxiaoyou.admin: ${APP_LOG_LEVEL:INFO}
    org.springframework.jdbc: WARN

app:
  integration:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://127.0.0.1:8080}
    public-health-path: ${APP_PUBLIC_HEALTH_PATH:/api/v1/health}
    timeout-ms: ${APP_INTEGRATION_TIMEOUT_MS:5000}
    phase6-seed-key: ${APP_PHASE6_SEED_KEY:phase6-mock-dataset-migration}
  translation:
    bridge-enabled: ${APP_TRANSLATION_BRIDGE_ENABLED:false}
    python-command: ${APP_TRANSLATION_PYTHON_COMMAND:python}
    bridge-script-path: ${APP_TRANSLATION_BRIDGE_SCRIPT_PATH:}
    request-timeout-ms: ${APP_TRANSLATION_REQUEST_TIMEOUT_MS:8000}
    max-text-length: ${APP_TRANSLATION_MAX_TEXT_LENGTH:5000}
    default-engine-priority: ${APP_TRANSLATION_DEFAULT_ENGINE_PRIORITY:google,bing,deepl,yandex,baidu,alibaba,sogou,iciba,tencent}
  ai:
    secret-encryption-password: ${APP_AI_SECRET_ENCRYPTION_PASSWORD:}
    secret-encryption-salt: ${APP_AI_SECRET_ENCRYPTION_SALT:}
    provider-test-timeout-ms: ${APP_AI_PROVIDER_TEST_TIMEOUT_MS:8000}
    request-timeout-ms: ${APP_AI_REQUEST_TIMEOUT_MS:30000}
    default-poll-interval-ms: ${APP_AI_DEFAULT_POLL_INTERVAL_MS:3000}
    max-download-bytes: ${APP_AI_MAX_DOWNLOAD_BYTES:67108864}
    dashscope-compatible-base-url: ${APP_AI_DASHSCOPE_COMPATIBLE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    dashscope-image-base-url: ${APP_AI_DASHSCOPE_IMAGE_BASE_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/image-generation/generation}
    dashscope-task-status-base-url: ${APP_AI_DASHSCOPE_TASK_STATUS_BASE_URL:https://dashscope.aliyuncs.com/api/v1/tasks}
    dashscope-tts-base-url: ${APP_AI_DASHSCOPE_TTS_BASE_URL:https://dashscope.aliyuncs.com/api/v1/services/audio/tts/SpeechSynthesizer}


