spring:
  config:
    import: optional:file:.env.cloudbase[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://127.0.0.1:27017/aoxiaoyou_doc}

logging:
  level:
    com.aoxiaoyou.admin: ${APP_LOG_LEVEL:INFO}
    org.springframework.jdbc: WARN
