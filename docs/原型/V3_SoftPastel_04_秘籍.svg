<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FFC0CB"/>
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#ADD8E6"/>
    </linearGradient>
    <linearGradient id="pastelMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="100%" style="stop-color:#90EE90"/>
    </linearGradient>
    <linearGradient id="pastelLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6E6FA"/>
      <stop offset="100%" style="stop-color:#DDA0DD"/>
    </linearGradient>
    <linearGradient id="pastelCream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="100%" style="stop-color:#FFFAF0"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="375" height="812" fill="#FFFAF0"/>
  
  <!-- 装饰元素 -->
  <circle cx="40" cy="120" r="60" fill="url(#pastelLavender)" opacity="0.15"/>
  <circle cx="330" cy="100" r="50" fill="url(#pastelPink)" opacity="0.1"/>
  
  <!-- 状态栏 -->
  <rect width="375" height="44" fill="transparent"/>
  
  <!-- 顶部导航 -->
  <g transform="translate(0, 44)">
    <rect width="375" height="60" fill="white" opacity="0.95"/>
    <text x="16" y="38" font-family="'PingFang SC', sans-serif" font-size="22" fill="#4A5568" font-weight="600">📚 秘籍</text>
    
    <!-- 右上角按钮 -->
    <g transform="translate(295, 12)">
      <circle cx="20" cy="20" r="20" fill="#F7FAFC"/>
      <text x="20" y="27" font-size="18" text-anchor="middle">💬</text>
    </g>
    <g transform="translate(335, 12)">
      <circle cx="20" cy="20" r="20" fill="#F7FAFC"/>
      <text x="20" y="27" font-size="18" text-anchor="middle">➕</text>
    </g>
  </g>
  
  <!-- 搜索栏 -->
  <g transform="translate(16, 116)">
    <rect width="343" height="48" rx="24" fill="white" filter="url(#softShadow)"/>
    <text x="16" y="30" font-size="18" fill="#A0AEC0">🔍</text>
    <text x="48" y="30" font-family="'PingFang SC', sans-serif" font-size="14" fill="#A0AEC0">搜索攻略、游记、美食...</text>
  </g>
  
  <!-- 分类标签 -->
  <g transform="translate(16, 180)">
    <!-- 推荐 -->
    <rect x="0" y="0" width="60" height="32" rx="16" fill="url(#pastelPink)" opacity="0.4"/>
    <text x="30" y="22" font-family="'PingFang SC', sans-serif" font-size="13" fill="#F687B3" text-anchor="middle" font-weight="600">推荐</text>
    
    <!-- 攻略 -->
    <g transform="translate(70, 0)">
      <rect x="0" y="0" width="60" height="32" rx="16" fill="#F7FAFC"/>
      <text x="30" y="22" font-family="'PingFang SC', sans-serif" font-size="13" fill="#718096" text-anchor="middle">攻略</text>
    </g>
    
    <!-- 游记 -->
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="60" height="32" rx="16" fill="#F7FAFC"/>
      <text x="30" y="22" font-family="'PingFang SC', sans-serif" font-size="13" fill="#718096" text-anchor="middle">游记</text>
    </g>
    
    <!-- 美食 -->
    <g transform="translate(210, 0)">
      <rect x="0" y="0" width="60" height="32" rx="16" fill="#F7FAFC"/>
      <text x="30" y="22" font-family="'PingFang SC', sans-serif" font-size="13" fill="#718096" text-anchor="middle">美食</text>
    </g>
    
    <!-- 更多 -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="44" height="32" rx="16" fill="#F7FAFC"/>
      <text x="22" y="22" font-size="16" fill="#718096" text-anchor="middle">⌄</text>
    </g>
  </g>
  
  <!-- 瀑布流内容 - 小红书风格 -->
  <g transform="translate(12, 232)">
    <!-- 左列 -->
    <g transform="translate(0, 0)">
      <!-- 卡片1 -->
      <g filter="url(#softShadow)">
        <rect width="168" height="220" rx="16" fill="white"/>
        <rect x="0" y="0" width="168" height="160" rx="16" fill="url(#pastelPink)" opacity="0.4"/>
        <text x="84" y="90" font-size="48" text-anchor="middle">🏛️</text>
        
        <g transform="translate(12, 168)">
          <text font-family="'PingFang SC', sans-serif" font-size="13" fill="#4A5568" font-weight="600">大三巴牌坊游玩全攻略</text>
          
          <g transform="translate(0, 24)">
            <circle cx="10" cy="8" r="8" fill="url(#pastelBlue)" opacity="0.4"/>
            <text x="24" y="11" font-family="'PingFang SC', sans-serif" font-size="11" fill="#718096">旅行达人</text>
            <text x="118" y="11" font-family="'PingFang SC', sans-serif" font-size="11" fill="#F687B3" text-anchor="end">❤️ 1.2k</text>
          </g>
        </g>
      </g>
      
      <!-- 卡片3 -->
      <g transform="translate(0, 240)" filter="url(#softShadow)">
        <rect width="168" height="200" rx="16" fill="white"/>
        <rect x="0" y="0" width="168" height="140" rx="16" fill="url(#pastelMint)" opacity="0.3"/>
        <text x="84" y="78" font-size="44" text-anchor="middle">🍜</text>
        
        <g transform="translate(12, 148)">
          <text font-family="'PingFang SC', sans-serif" font-size="13" fill="#4A5568" font-weight="600">澳门必吃葡国菜</text>
          
          <g transform="translate(0, 24)">
            <text x="118" y="0" font-family="'PingFang SC', sans-serif" font-size="11" fill="#68D391" text-anchor="end">❤️ 856</text>
          </g>
        </g>
      </g>
    </g>
    
    <!-- 右列 -->
    <g transform="translate(180, 0)">
      <!-- 卡片2 -->
      <g filter="url(#softShadow)">
        <rect width="168" height="240" rx="16" fill="white"/>
        <rect x="0" y="0" width="168" height="180" rx="16" fill="url(#pastelBlue)" opacity="0.3"/>
        <text x="84" y="100" font-size="48" text-anchor="middle">🌅</text>
        
        <g transform="translate(12, 188)">
          <text font-family="'PingFang SC', sans-serif" font-size="13" fill="#4A5568" font-weight="600">澳门日落拍照圣地</text>
          
          <g transform="translate(0, 24)">
            <text x="118" y="0" font-family="'PingFang SC', sans-serif" font-size="11" fill="#63B3ED" text-anchor="end">❤️ 2.3k</text>
          </g>
        </g>
      </g>
      
      <!-- 卡片4 -->
      <g transform="translate(0, 260)" filter="url(#softShadow)">
        <rect width="168" height="220" rx="16" fill="white"/>
        <rect x="0" y="0" width="168" height="160" rx="16" fill="url(#pastelLavender)" opacity="0.3"/>
        <text x="84" y="90" font-size="48" text-anchor="middle">🎭</text>
        
        <g transform="translate(12, 168)">
          <text font-family="'PingFang SC', sans-serif" font-size="13" fill="#4A5568" font-weight="600">澳门文化探索之旅</text>
          
          <g transform="translate(0, 24)">
            <text x="118" y="0" font-family="'PingFang SC', sans-serif" font-size="11" fill="#9F7AEA" text-anchor="end">❤️ 1.8k</text>
          </g>
        </g>
      </g>
    </g>
  </g>
  
  <!-- 底部导航栏 -->
  <g transform="translate(0, 734)">
    <rect width="375" height="78" fill="white" opacity="0.95"/>
    
    <g transform="translate(0, 8)">
      <!-- 首页 -->
      <g transform="translate(37.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🏠</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">首页</text>
      </g>
      <!-- 地图 -->
      <g transform="translate(112.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🗺️</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">地图</text>
      </g>
      <!-- 秘籍 (Active) -->
      <g transform="translate(187.5, 0)">
        <circle cx="0" cy="10" r="18" fill="url(#pastelMint)" opacity="0.3"/>
        <text x="0" y="16" font-size="18" fill="#68D391" text-anchor="middle">📚</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#68D391" text-anchor="middle" font-weight="600">秘籍</text>
      </g>
      <!-- 发现 -->
      <g transform="translate(262.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🔍</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">发现</text>
      </g>
      <!-- 我的 -->
      <g transform="translate(337.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">👤</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">我的</text>
      </g>
    </g>
  </g>
  
  <!-- 底部安全区 -->
  <rect x="0" y="790" width="375" height="22" fill="#FFFAF0"/>
</svg>