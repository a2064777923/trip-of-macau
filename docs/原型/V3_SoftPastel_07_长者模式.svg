<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FFC0CB"/>
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#ADD8E6"/>
    </linearGradient>
    <linearGradient id="pastelMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="100%" style="stop-color:#90EE90"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="375" height="812" fill="#FFFAF0"/>
  
  <!-- 状态栏 -->
  <rect width="375" height="44" fill="transparent"/>
  
  <!-- 头部 -->
  <g transform="translate(0, 44)">
    <rect width="375" height="80" fill="white" opacity="0.95"/>
    <text x="20" y="52" font-family="'PingFang SC', sans-serif" font-size="28" fill="#4A5568" font-weight="700">👴 长者模式</text>
    <circle cx="340" cy="44" r="28" fill="url(#pastelPink)" opacity="0.3"/>
    <text x="340" y="54" font-size="24" text-anchor="middle">😊</text>
  </g>
  
  <!-- 主内容区 -->
  <g transform="translate(20, 140)">
    <!-- 大字标题 -->
    <text font-family="'PingFang SC', sans-serif" font-size="32" fill="#4A5568" font-weight="700">今天去哪里？</text>
    
    <!-- 大号按钮1 - 探索地图 -->
    <g transform="translate(0, 60)" filter="url(#softShadow)">
      <rect width="335" height="100" rx="20" fill="url(#pastelMint)" opacity="0.3"/>
      <rect width="335" height="100" rx="20" fill="white" opacity="0.95"/>
      <text x="35" y="55" font-size="48">🗺️</text>
      <text x="140" y="40" font-family="'PingFang SC', sans-serif" font-size="28" fill="#4A5568" font-weight="600">探索地图</text>
      <text x="140" y="78" font-family="'PingFang SC', sans-serif" font-size="18" fill="#718096">查看附近景点</text>
    </g>
    
    <!-- 大号按钮2 - 我的收藏 -->
    <g transform="translate(0, 180)" filter="url(#softShadow)">
      <rect width="335" height="100" rx="20" fill="url(#pastelPink)" opacity="0.3"/>
      <rect width="335" height="100" rx="20" fill="white" opacity="0.95"/>
      <text x="35" y="55" font-size="48">⭐</text>
      <text x="140" y="40" font-family="'PingFang SC', sans-serif" font-size="28" fill="#4A5568" font-weight="600">我的收藏</text>
      <text x="140" y="78" font-family="'PingFang SC', sans-serif" font-size="18" fill="#718096">已保存 12 个景点</text>
    </g>
    
    <!-- 大号按钮3 - 语音助手 -->
    <g transform="translate(0, 300)" filter="url(#softShadow)">
      <rect width="335" height="100" rx="20" fill="url(#pastelBlue)" opacity="0.3"/>
      <rect width="335" height="100" rx="20" fill="white" opacity="0.95"/>
      <text x="35" y="55" font-size="48">🎙️</text>
      <text x="140" y="40" font-family="'PingFang SC', sans-serif" font-size="28" fill="#4A5568" font-weight="600">语音助手</text>
      <text x="140" y="78" font-family="'PingFang SC', sans-serif" font-size="18" fill="#718096">按住说话导航</text>
    </g>
    
    <!-- 大号按钮4 - 紧急联系 -->
    <g transform="translate(0, 420)" filter="url(#softShadow)">
      <rect width="335" height="100" rx="20" fill="#FEEBC8" opacity="0.6"/>
      <rect width="335" height="100" rx="20" fill="white" opacity="0.95"/>
      <text x="35" y="55" font-size="48">📞</text>
      <text x="140" y="40" font-family="'PingFang SC', sans-serif" font-size="28" fill="#C53030" font-weight="600">紧急联系</text>
      <text x="140" y="78" font-family="'PingFang SC', sans-serif" font-size="18" fill="#718096">一键呼叫家人</text>
    </g>
  </g>
  
  <!-- 继续按钮 -->
  <g transform="translate(20, 710)">
    <rect width="335" height="48" rx="24" fill="url(#pastelBlue)" opacity="0.3"/>
    <rect width="335" height="48" rx="24" fill="white" opacity="0.95"/>
    <text x="167.5" y="31" font-family="'PingFang SC', sans-serif" font-size="20" fill="#63B3ED" text-anchor="middle" font-weight="600">🏠 返回首页</text>
  </g>
  
  <!-- 底部安全区 -->
  <rect x="0" y="790" width="375" height="22" fill="#FFFAF0"/>
</svg>