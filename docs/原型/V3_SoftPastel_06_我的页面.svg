<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FFC0CB"/>
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#ADD8E6"/>
    </linearGradient>
    <linearGradient id="pastelMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="100%" style="stop-color:#90EE90"/>
    </linearGradient>
    <linearGradient id="pastelLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6E6FA"/>
      <stop offset="100%" style="stop-color:#DDA0DD"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="375" height="812" fill="#FFFAF0"/>
  
  <!-- 装饰波浪 -->
  <path d="M0 180 Q 180 120, 375 180 L 375 0 L 0 0 Z" fill="url(#pastelPink)" opacity="0.2"/>
  <circle cx="300" cy="80" r="60" fill="url(#pastelMint)" opacity="0.15"/>
  <circle cx="50" cy="120" r="40" fill="url(#pastelLavender)" opacity="0.2"/>
  
  <!-- 状态栏 -->
  <rect width="375" height="44" fill="transparent"/>
  
  <!-- 头部 -->
  <g transform="translate(0, 44)">
    <text x="16" y="36" font-family="'PingFang SC', sans-serif" font-size="22" fill="#4A5568" font-weight="600">我的主页</text>
    <g transform="translate(310, 8)">
      <circle cx="20" cy="20" r="20" fill="url(#pastelPink)" opacity="0.3"/>
      <text x="20" y="26" font-size="16" text-anchor="middle">⚙️</text>
    </g>
  </g>
  
  <!-- 用户信息卡片 -->
  <g transform="translate(16, 100)">
    <rect width="343" height="160" rx="20" fill="white" filter="url(#softShadow)"/>
    
    <!-- 头像 -->
    <circle cx="60" cy="60" r="40" fill="url(#pastelPink)"/>
    <text x="60" y="72" font-size="32" text-anchor="middle">😊</text>
    
    <!-- 用户信息 -->
    <g transform="translate(120, 32)">
      <text font-family="'PingFang SC', sans-serif" font-size="20" fill="#4A5568" font-weight="600">旅行者小明</text>
      <text x="0" y="28" font-family="'PingFang SC', sans-serif" font-size="13" fill="#718096">探索澳门 7 天 · 已打卡 12 个景点</text>
    </g>
    
    <!-- 统计数据 -->
    <g transform="translate(0, 110)">
      <g transform="translate(48, 0)">
        <text x="0" y="0" font-family="'PingFang SC', sans-serif" font-size="24" fill="#4A5568" font-weight="700" text-anchor="middle">12</text>
        <text x="0" y="24" font-family="'PingFang SC', sans-serif" font-size="12" fill="#718096" text-anchor="middle">印章</text>
      </g>
      
      <g transform="translate(130, 0)">
        <text x="0" y="0" font-family="'PingFang SC', sans-serif" font-size="24" fill="#4A5568" font-weight="700" text-anchor="middle">8</text>
        <text x="0" y="24" font-family="'PingFang SC', sans-serif" font-size="12" fill="#718096" text-anchor="middle">故事</text>
      </g>
      
      <g transform="translate(212, 0)">
        <text x="0" y="0" font-family="'PingFang SC', sans-serif" font-size="24" fill="#4A5568" font-weight="700" text-anchor="middle">36</text>
        <text x="0" y="24" font-family="'PingFang SC', sans-serif" font-size="12" fill="#718096" text-anchor="middle">收藏</text>
      </g>
      
      <g transform="translate(295, 0)">
        <text x="0" y="0" font-family="'PingFang SC', sans-serif" font-size="24" fill="#4A5568" font-weight="700" text-anchor="middle">5</text>
        <text x="0" y="24" font-family="'PingFang SC', sans-serif" font-size="12" fill="#718096" text-anchor="middle">攻略</text>
      </g>
    </g>
  </g>
  
  <!-- 我的成就 -->
  <g transform="translate(16, 280)">
    <text font-family="'PingFang SC', sans-serif" font-size="16" fill="#4A5568" font-weight="600">🏆 我的成就</text>
    <g transform="translate(0, 32)">
      <rect width="164" height="90" rx="16" fill="url(#pastelMint)" opacity="0.3"/>
      <rect width="164" height="90" rx="16" fill="white" opacity="0.95"/>
      <text x="20" y="42" font-size="32">🥇</text>
      <text x="20" y="70" font-family="'PingFang SC', sans-serif" font-size="14" fill="#4A5568" font-weight="600">初来乍到</text>
      
      <g transform="translate(179, 0)">
        <rect width="164" height="90" rx="16" fill="url(#pastelLavender)" opacity="0.3"/>
        <rect width="164" height="90" rx="16" fill="white" opacity="0.95"/>
        <text x="20" y="42" font-size="32">🏆</text>
        <text x="20" y="70" font-family="'PingFang SC', sans-serif" font-size="14" fill="#4A5568" font-weight="600">探索达人</text>
      </g>
    </g>
  </g>
  
  <!-- 功能菜单 -->
  <g transform="translate(16, 396)">
    <text font-family="'PingFang SC', sans-serif" font-size="16" fill="#4A5568" font-weight="600">⚙️ 功能菜单</text>
    
    <g transform="translate(0, 32)" filter="url(#softShadow)">
      <rect width="343" height="56" rx="16" fill="white"/>
      <text x="16" y="32" font-size="20">🔖</text>
      <text x="48" y="32" font-family="'PingFang SC', sans-serif" font-size="15" fill="#4A5568">我的收藏</text>
      <text x="312" y="32" font-family="'PingFang SC', sans-serif" font-size="14" fill="#A0AEC0">12 ></text>
    </g>
    
    <g transform="translate(0, 96)" filter="url(#softShadow)">
      <rect width="343" height="56" rx="16" fill="white"/>
      <text x="16" y="32" font-size="20">📍</text>
      <text x="48" y="32" font-family="'PingFang SC', sans-serif" font-size="15" fill="#4A5568">足迹记录</text>
      <text x="312" y="32" font-family="'PingFang SC', sans-serif" font-size="14" fill="#A0AEC0">8 ></text>
    </g>
    
    <g transform="translate(0, 160)" filter="url(#softShadow)">
      <rect width="343" height="56" rx="16" fill="white"/>
      <text x="16" y="32" font-size="20">👴</text>
      <text x="48" y="32" font-family="'PingFang SC', sans-serif" font-size="15" fill="#4A5568">长者模式</text>
      <text x="290" y="32" font-family="'PingFang SC', sans-serif" font-size="14" fill="#A0AEC0">已关闭 ></text>
    </g>
    
    <g transform="translate(0, 224)" filter="url(#softShadow)">
      <rect width="343" height="56" rx="16" fill="white"/>
      <text x="16" y="32" font-size="20">📞</text>
      <text x="48" y="32" font-family="'PingFang SC', sans-serif" font-size="15" fill="#4A5568">紧急联系</text>
      <text x="312" y="32" font-family="'PingFang SC', sans-serif" font-size="14" fill="#A0AEC0">></text>
    </g>
  </g>
  
  <!-- 底部导航栏 -->
  <g transform="translate(0, 734)">
    <rect width="375" height="78" fill="white" opacity="0.95"/>
    
    <g transform="translate(0, 8)">
      <!-- 首页 -->
      <g transform="translate(37.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🏠</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">首页</text>
      </g>
      <!-- 地图 -->
      <g transform="translate(112.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🗺️</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">地图</text>
      </g>
      <!-- 秘籍 -->
      <g transform="translate(187.5, 0)">
        <circle cx="0" cy="10" r="20" fill="url(#pastelMint)" opacity="0.3"/>
        <text x="0" y="16" font-size="18" fill="#68D391" text-anchor="middle">📚</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#68D391" text-anchor="middle">秘籍</text>
      </g>
      <!-- 发现 -->
      <g transform="translate(262.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🔍</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">发现</text>
      </g>
      <!-- 我的 (Active) -->
      <g transform="translate(337.5, 0)">
        <circle cx="0" cy="10" r="18" fill="url(#pastelPink)" opacity="0.3"/>
        <text x="0" y="16" font-size="20" fill="#F687B3" text-anchor="middle">👤</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#F687B3" text-anchor="middle" font-weight="600">我的</text>
      </g>
    </g>
  </g>
  
  <!-- 底部安全区 -->
  <rect x="0" y="790" width="375" height="22" fill="#FFFAF0"/>
</svg>