<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FFC0CB"/>
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#ADD8E6"/>
    </linearGradient>
    <linearGradient id="pastelMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="100%" style="stop-color:#90EE90"/>
    </linearGradient>
    <linearGradient id="pastelLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6E6FA"/>
      <stop offset="100%" style="stop-color:#DDA0DD"/>
    </linearGradient>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBD38D"/>
      <stop offset="50%" style="stop-color:#F687B3"/>
      <stop offset="100%" style="stop-color:#9F7AEA"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="375" height="812" fill="#FFFAF0"/>
  
  <!-- 装饰波浪 -->
  <path d="M0 180 Q 180 120, 375 180 L 375 0 L 0 0 Z" fill="url(#pastelLavender)" opacity="0.15"/>
  <circle cx="300" cy="100" r="100" fill="url(#pastelLavender)" opacity="0.1"/>
  <circle cx="60" cy="180" r="60" fill="url(#pastelPink)" opacity="0.15"/>
  
  <!-- 状态栏 -->
  <rect width="375" height="44" fill="transparent"/>
  
  <!-- 头部 -->
  <g transform="translate(0, 44)">
    <rect width="375" height="60" fill="transparent"/>
    <text x="16" y="40" font-family="'PingFang SC', sans-serif" font-size="22" fill="#4A5568" font-weight="600">🔍 发现</text>
    <circle cx="340" cy="32" r="18" fill="url(#pastelMint)" opacity="0.3"/>
    <text x="340" y="38" font-size="16" text-anchor="middle">🌐</text>
  </g>
  
  <!-- 搜索 -->
  <g transform="translate(16, 120)">
    <rect width="343" height="48" rx="24" fill="white" filter="url(#softShadow)"/>
    <text x="16" y="30" font-size="18" fill="#A0AEC0">🔍</text>
    <text x="44" y="30" font-family="'PingFang SC', sans-serif" font-size="14" fill="#A0AEC0">搜索景点、美食、活动...</text>
  </g>
  
  <!-- 推荐卡片 -->
  <g transform="translate(16, 188)">
    <rect width="343" height="160" rx="20" fill="white" filter="url(#softShadow)"/>
    
    <!-- 标题 -->
    <text x="16" y="28" font-family="'PingFang SC', sans-serif" font-size="16" fill="#4A5568" font-weight="600">🌟 今日推荐</text>
    
    <!-- 推荐内容 -->
    <g transform="translate(16, 44)">
      <rect width="100" height="100" rx="16" fill="url(#pastelBlue)" opacity="0.3"/>
      <text x="50" y="60" font-size="36" text-anchor="middle">🏛️</text>
      <text x="50" y="88" font-family="'PingFang SC', sans-serif" font-size="11" fill="#4A5568" text-anchor="middle">大三巴</text>
      
      <g transform="translate(112, 0)">
        <rect width="100" height="100" rx="16" fill="url(#pastelPink)" opacity="0.3"/>
        <text x="50" y="60" font-size="36" text-anchor="middle">🍽️</text>
        <text x="50" y="88" font-family="'PingFang SC', sans-serif" font-size="11" fill="#4A5568" text-anchor="middle">葡国菜</text>
      </g>
      
      <g transform="translate(208, 0)">
        <rect width="87" height="100" rx="16" fill="url(#pastelMint)" opacity="0.3"/>
        <text x="43.5" y="60" font-size="36" text-anchor="middle">🎭</text>
        <text x="43.5" y="88" font-family="'PingFang SC', sans-serif" font-size="11" fill="#4A5568" text-anchor="middle">表演</text>
      </g>
    </g>
  </g>
  
  <!-- 附近活动 -->
  <g transform="translate(16, 372)">
    <text font-family="'PingFang SC', sans-serif" font-size="16" fill="#4A5568" font-weight="600">📍 附近活动</text>
    
    <!-- 活动1 -->
    <g transform="translate(0, 32)" filter="url(#softShadow)">
      <rect width="343" height="100" rx="16" fill="white"/>
      <rect x="12" y="12" width="76" height="76" rx="12" fill="url(#pastelPink)" opacity="0.3"/>
      <text x="50" y="55" font-size="28" text-anchor="middle">🎨</text>
      
      <g transform="translate(100, 16)">
        <text font-family="'PingFang SC', sans-serif" font-size="15" fill="#4A5568" font-weight="600">大三巴艺术展览</text>
        <text y="24" font-family="'PingFang SC', sans-serif" font-size="12" fill="#718096">📅 本周六 14:00</text>
        <text y="44" font-family="'PingFang SC', sans-serif" font-size="11" fill="#F687B3">距离 350m · 🔥 128人参加</text>
      </g>
    </g>
    
    <!-- 活动2 -->
    <g transform="translate(0, 144)" filter="url(#softShadow)">
      <rect width="343" height="100" rx="16" fill="white"/>
      <rect x="12" y="12" width="76" height="76" rx="12" fill="url(#pastelMint)" opacity="0.3"/>
      <text x="50" y="55" font-size="28" text-anchor="middle">🎵</text>
      
      <g transform="translate(100, 16)">
        <text font-family="'PingFang SC', sans-serif" font-size="15" fill="#4A5568" font-weight="600">街头音乐节</text>
        <text y="24" font-family="'PingFang SC', sans-serif" font-size="12" fill="#718096">📅 今晚 19:00</text>
        <text y="44" font-family="'PingFang SC', sans-serif" font-size="11" fill="#68D391">距离 800m · 🔥 256人参加</text>
      </g>
    </g>
  </g>
  
  <!-- 底部导航栏 -->
  <g transform="translate(0, 734)">
    <rect width="375" height="78" fill="white" opacity="0.95"/>
    
    <g transform="translate(0, 8)">
      <!-- 首页 -->
      <g transform="translate(37.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🏠</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">首页</text>
      </g>
      <!-- 地图 -->
      <g transform="translate(112.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🗺️</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">地图</text>
      </g>
      <!-- 秘籍 -->
      <g transform="translate(187.5, 0)">
        <circle cx="0" cy="10" r="20" fill="url(#pastelMint)" opacity="0.3"/>
        <text x="0" y="16" font-size="18" fill="#68D391" text-anchor="middle">📚</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#68D391" text-anchor="middle">秘籍</text>
      </g>
      <!-- 发现 (Active) -->
      <g transform="translate(262.5, 0)">
        <circle cx="0" cy="10" r="18" fill="url(#pastelBlue)" opacity="0.3"/>
        <text x="0" y="16" font-size="20" fill="#4299E1" text-anchor="middle">🔍</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#4299E1" text-anchor="middle" font-weight="600">发现</text>
      </g>
      <!-- 我的 -->
      <g transform="translate(337.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">👤</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">我的</text>
      </g>
    </g>
  </g>
  
  <!-- 底部安全区 -->
  <rect x="0" y="790" width="375" height="22" fill="#FFFAF0"/>
</svg>