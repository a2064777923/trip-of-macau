<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="50%" style="stop-color:#90EE90"/>
      <stop offset="100%" style="stop-color:#F0FFF0"/>
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6"/>
      <stop offset="50%" style="stop-color:#ADD8E6"/>
      <stop offset="100%" style="stop-color:#E0FFFF"/>
    </linearGradient>
    <linearGradient id="pastelPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="50%" style="stop-color:#FFC0CB"/>
      <stop offset="100%" style="stop-color:#FFE4E1"/>
    </linearGradient>
    <linearGradient id="pastelLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6E6FA"/>
      <stop offset="50%" style="stop-color:#DDA0DD"/>
      <stop offset="100%" style="stop-color:#FFF0F5"/>
    </linearGradient>
    
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="375" height="812" fill="#FFFAF0"/>
  
  <!-- 装饰波浪 -->
  <path d="M0 150 Q 200 100, 375 150 L 375 0 L 0 0 Z" fill="url(#pastelMint)" opacity="0.2"/>
  
  <!-- 状态栏 -->
  <rect width="375" height="44" fill="#FFFAF0"/>
  
  <!-- 头部 -->
  <g transform="translate(0, 44)">
    <rect width="375" height="56" fill="transparent"/>
    <text x="16" y="36" font-family="'PingFang SC', sans-serif" font-size="20" fill="#4A5568" font-weight="600">🗺️ 探索地图</text>
    <!-- 头像 -->
    <circle cx="340" cy="28" r="18" fill="url(#pastelPink)" opacity="0.5"/>
    <text x="340" y="34" font-size="16" text-anchor="middle">😊</text>
  </g>
  
  <!-- 地图区域 -->
  <g transform="translate(16, 100)">
    <!-- 地图背景 -->
    <rect width="343" height="400" rx="24" fill="white" filter="url(#softShadow)"/>
    
    <!-- 地图底色 -->
    <rect x="8" y="8" width="327" height="384" rx="16" fill="#F0FFF0" opacity="0.3"/>
    
    <!-- 手绘风格道路 -->
    <path d="M 50 100 Q 150 80, 200 140 T 300 200" stroke="#E8E8E8" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 50 100 Q 150 80, 200 140 T 300 200" stroke="url(#pastelCream)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <path d="M 60 250 Q 120 230, 180 280 T 280 350" stroke="#E8E8E8" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 60 250 Q 120 230, 180 280 T 280 350" stroke="#F5DEB3" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- 河流 -->
    <path d="M -10 350 Q 80 320, 180 360 T 350 340" fill="url(#pastelBlue)" opacity="0.2"/>
    
    <!-- 目标景点 - 大三巴 -->
    <g transform="translate(180, 150)">
      <circle cx="0" cy="0" r="25" fill="url(#pastelPink)" opacity="0.3">
        <animate attributeName="r" values="25;30;25" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="18" fill="white" filter="url(#softShadow)"/>
      <circle cx="0" cy="0" r="12" fill="#F687B3"/>
      <text x="0" y="4" font-size="12" fill="white" text-anchor="middle">📍</text>
      <!-- 标签 -->
      <g transform="translate(0, -35)">
        <rect x="-40" y="-12" width="80" height="24" rx="12" fill="white" filter="url(#softShadow)"/>
        <text x="0" y="4" font-family="'PingFang SC', sans-serif" font-size="11" fill="#4A5568" text-anchor="middle" font-weight="600">大三巴牌坊</text>
      </g>
    </g>
    
    <!-- 已打卡景点 -->
    <g transform="translate(100, 120)">
      <circle cx="0" cy="0" r="10" fill="#68D391"/>
      <text x="0" y="3" font-size="10" fill="white" text-anchor="middle">✓</text>
      <text x="0" y="20" font-family="'PingFang SC', sans-serif" font-size="9" fill="#68D391" text-anchor="middle">妈阁庙</text>
    </g>
    
    <!-- 虚拟物品 -->
    <g transform="translate(250, 200)">
      <circle cx="0" cy="0" r="8" fill="url(#pastelLavender)" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.3;0.6" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" font-size="10" text-anchor="middle">💎</text>
    </g>
    
    <!-- 用户位置 -->
    <g transform="translate("140", 280)">
      <circle cx="0" cy="0" r="20" fill="#9DECFA" opacity="0.3"/>
      <circle cx="0" cy="0" r="12" fill="white" filter="url(#softShadow)"/>
      <circle cx="0" cy="0" r="6" fill="#4299E1"/>
      <text x="0" y="20" font-family="'PingFang SC', sans-serif" font-size="9" fill="#4299E1" text-anchor="middle">你在这里</text>
    </g>
    
    <!-- 导航路线 -->
    <path d="M 140 280 Q 160 220, 180 150" stroke="#F687B3" stroke-width="3" fill="none" stroke-dasharray="8 4" opacity="0.6"/>
  </g>
  
  <!-- 底部卡片 -->
  <g transform="translate(16, 520)">
    <rect width="343" height="120" rx="20" fill="white" filter="url(#softShadow)"/>
    
    <!-- 目标信息 -->
    <g transform="translate(16, 16)">
      <circle cx="24" cy="24" r="24" fill="url(#pastelPink)" opacity="0.3"/>
      <text x="24" y="32" font-size="24" text-anchor="middle">🏛️</text>
      
      <g transform="translate(60, 0)">
        <text font-family="'PingFang SC', sans-serif" font-size="18" fill="#4A5568" font-weight="600">大三巴牌坊</text>
        <text y="24" font-family="'PingFang SC', sans-serif" font-size="13" fill="#718096">距离 150m · 步行约 2 分钟</text>
      </g>
    </g>
    
    <!-- 开始导航按钮 -->
    <g transform="translate(16, 72)">
      <rect width="311" height="32" rx="16" fill="url(#pastelMint)" opacity="0.4"/>
      <rect width="311" height="32" rx="16" fill="white" opacity="0.9"/>
      <text x="155.5" y="21" font-family="'PingFang SC', sans-serif" font-size="14" fill="#48BB78" text-anchor="middle" font-weight="600">🎯 开始导航</text>
    </g>
  </g>
  
  <!-- 我的收集 -->
  <g transform="translate(16, 660)">
    <text font-family="'PingFang SC', sans-serif" font-size="16" fill="#4A5568" font-weight="600">🎒 我的收集</text>
    <g transform="translate(0, 28)">
      <rect width="79" height="64" rx="12" fill="url(#pastelLavender)" opacity="0.3"/>
      <rect width="79" height="64" rx="12" fill="white" opacity="0.9"/>
      <text x="39.5" y="40" font-size="20" text-anchor="middle">💎</text>
      <text x="39.5" y="56" font-family="'PingFang SC', sans-serif" font-size="10" fill="#718096" text-anchor="middle">宝石 x3</text>
      
      <g transform="translate(88, 0)">
        <rect width="79" height="64" rx="12" fill="url(#pastelBlue)" opacity="0.3"/>
        <rect width="79" height="64" rx="12" fill="white" opacity="0.9"/>
        <text x="39.5" y="40" font-size="20" text-anchor="middle">⭐</text>
        <text x="39.5" y="56" font-family="'PingFang SC', sans-serif" font-size="10" fill="#718096" text-anchor="middle">星星 x5</text>
      </g>
      
      <g transform="translate(176, 0)">
        <rect width="79" height="64" rx="12" fill="url(#pastelPink)" opacity="0.3"/>
        <rect width="79" height="64" rx="12" fill="white" opacity="0.9"/>
        <text x="39.5" y="40" font-size="20" text-anchor="middle">❤️</text>
        <text x="39.5" y="56" font-family="'PingFang SC', sans-serif" font-size="10" fill="#718096" text-anchor="middle">爱心 x8</text>
      </g>
      
      <g transform="translate(264, 0)">
        <rect width="79" height="64" rx="12" fill="#E2E8F0" opacity="0.5"/>
        <text x="39.5" y="40" font-size="20" text-anchor="middle">...</text>
        <text x="39.5" y="56" font-family="'PingFang SC', sans-serif" font-size="10" fill="#718096" text-anchor="middle">更多</text>
      </g>
    </g>
  </g>
  
  <!-- 底部导航栏 -->
  <g transform="translate(0, 734)">
    <rect width="375" height="78" fill="white" opacity="0.95"/>
    
    <g transform="translate(0, 8)">
      <!-- 首页 -->
      <g transform="translate(37.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🏠</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">首页</text>
      </g>
      <!-- 地图 (Active) -->
      <g transform="translate(112.5, 0)">
        <circle cx="0" cy="10" r="18" fill="url(#pastelMint)" opacity="0.3"/>
        <text x="0" y="16" font-size="20" fill="#48BB78" text-anchor="middle">🗺️</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#48BB78" text-anchor="middle" font-weight="600">地图</text>
      </g>
      <!-- 秘籍 -->
      <g transform="translate(187.5, 0)">
        <circle cx="0" cy="10" r="20" fill="url(#pastelBlue)" opacity="0.3"/>
        <text x="0" y="16" font-size="18" fill="#63B3ED" text-anchor="middle">📚</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#63B3ED" text-anchor="middle">秘籍</text>
      </g>
      <!-- 发现 -->
      <g transform="translate(262.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">🔍</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">发现</text>
      </g>
      <!-- 我的 -->
      <g transform="translate(337.5, 0)">
        <text x="0" y="16" font-size="20" fill="#A0AEC0" text-anchor="middle">👤</text>
        <text x="0" y="36" font-family="'PingFang SC', sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">我的</text>
      </g>
    </g>
  </g>
  
  <!-- 底部安全区 -->
  <rect x="0" y="790" width="375" height="22" fill="#FFFAF0"/>
</svg>